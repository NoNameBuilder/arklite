name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./...

  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
          - goos: freebsd
            goarch: amd64
            ext: ""
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/arklite-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .
      - name: package
        run: |
          cd dist
          asset="arklite-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            asset="$asset.zip"
            zip "$asset" "arklite-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          else
            asset="$asset.tar.gz"
            tar -czf "$asset" "arklite-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: arklite-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.tar.gz

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
      - name: flatten
        run: |
          mkdir -p upload
          find dist -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
      - name: checksums
        run: |
          cd upload
          sha256sum *.zip *.tar.gz > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v3
        with:
          files: upload/*
          generate_release_notes: true
